name: Deploy GitHub Pages (main + testing)

on:
  push:
    branches:
      - main
      - testing
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          fetch-depth: 0

      - name: Checkout testing
        uses: actions/checkout@v4
        with:
          ref: testing
          path: testing
          fetch-depth: 0

      - name: Build site folder
        run: |
          mkdir -p public/testing
          rsync -a --delete --exclude='.git' --exclude='.github' main/ public/
          rsync -a --delete --exclude='.git' --exclude='.github' testing/ public/testing/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
